<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Universal Trading Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;background:#0f172a;color:#fff;font-family:Arial,sans-serif;height:100vh;overflow:hidden}
.app-container{display:flex;height:100vh;max-width:1400px;margin:0 auto}

.main-content{flex:1;padding:30px;overflow-y:auto;display:flex;flex-direction:column}
.sidebar{width:320px;background:#1e293b;border-left:1px solid #334155;display:flex;flex-direction:column;height:100%}
.sidebar-header{padding:20px;border-bottom:1px solid #334155}
.sidebar-header h3{margin:0;font-size:18px}
.stock-list{flex:1;overflow-y:auto;padding:10px}
.stock-item{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;margin-bottom:8px;background:#1e293b;border:1px solid #334155;border-radius:10px;cursor:pointer;transition:all .2s ease}
.stock-item:hover{background:#334155;transform:translateX(-3px)}
.stock-item .ticker{font-weight:bold;font-size:15px}
.stock-item .name{font-size:12px;color:#cbd5e1;margin-top:2px}
.stock-item .market-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:#475569;font-weight:bold}
.card{background:#1e293b;padding:25px;border-radius:16px;border:1px solid #334155;display:flex;flex-direction:column;flex:1;}
.search-box{display:flex;gap:10px;margin-bottom:20px}
input,button{padding:12px;border:none;border-radius:8px;font-size:16px}
input{flex:1;background:#334155;color:#fff}
input:focus{outline:2px solid #2563eb}
button{background:#2563eb;color:#fff;cursor:pointer;font-weight:bold;padding:12px 24px}
button:hover{background:#1d4ed8}
h1{margin-top:0;font-size:28px}
#price{font-size:44px;font-weight:bold;margin-top:15px;letter-spacing:-1px}
#change{font-size:18px;margin-bottom:15px;font-weight:500}
.green{color:#22c55e}.red{color:#ef4444}
.chart-container{margin-top:20px;position:relative;flex:1;min-height:350px}
canvas{background:#1e293b;border-radius:12px}
small{color:#cbd5e1}
.status-badge{font-size:12px;background:#2563eb;padding:4px 10px;border-radius:6px;float:right;font-weight:bold}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#475569;border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:#64748b}
</style>
</head>
<body>

<div class="app-container">
  <div class="main-content">
    <div class="card">
      <div class="status-badge" id="api-status">Engine: 12Data</div>
      <h1>🌍 Multi-Market Trading Board</h1>
      <p style="margin-top:-5px; margin-bottom:20px;"><small>Searches Twelve Data. Automatically routes through an unlimited live backup network if rate limits are hit.</small></p>
      
      <div class="search-box">
        <input id="symbol" placeholder="Search any stock (e.g., AAPL, AMD, GOOGL, CUPID, SENSEX, RELIANCE)" value="AAPL">
        <button onclick="handleSearch()">Search Asset</button>
      </div>

      <h2 id="company" style="margin-bottom:5px; color:#f8fafc;">--</h2>
      <div id="price">--</div>
      <div id="change">--</div>

      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <h3>🔥 Popular Watchlist</h3>
      <p style="margin:5px 0 0 0; font-size:12px; color:#cbd5e1;">Click to load live data arrays</p>
    </div>
    <div class="stock-list" id="watchlist"></div>
  </div>
</div>

<script>
const TWELVE_DATA_KEY = "56093876cedd49b1b26e1ba33d9bae36";
let chart;

// Base configuration sample watchlist mapping
const popularStocks = [
  { ticker: "SENSEX", name: "BSE SENSEX Index", market: "INDEX" },
  { ticker: "AMD", name: "Advanced Micro Devices", market: "NASDAQ" },
  { ticker: "AAPL", name: "Apple Inc.", market: "NASDAQ" },
  { ticker: "GOOGL", name: "Alphabet Inc.", market: "NASDAQ" },
  { ticker: "CUPID", name: "Cupid Limited", market: "NSE" },
  { ticker: "RELIANCE", name: "Reliance Industries", market: "NSE" }
];

function buildWatchlist() {
  const container = document.getElementById("watchlist");
  container.innerHTML = "";
  popularStocks.forEach(stock => {
    const item = document.createElement("div");
    item.className = "stock-item";
    item.onclick = () => {
      document.getElementById("symbol").value = stock.ticker;
      loadAssetData(stock.ticker);
    };
    item.innerHTML = `
      <div>
        <div class="ticker">${stock.ticker}</div>
        <div class="name">${stock.name}</div>
      </div>
      <span class="market-tag">${stock.market}</span>
    `;
    container.appendChild(item);
  });
}

function handleSearch() {
  const query = document.getElementById("symbol").value.trim().toUpperCase();
  if(query) loadAssetData(query);
}

// Master Orchestrator: Combines Twelve Data API with an unlimited live network fallback
async function loadAssetData(symbol) {
  updateStatusBadge("Engine: 12Data", "#2563eb");
  
  // Try Twelve Data API first
  let twelveDataSuccess = await fetchTwelveData(symbol);
  if (twelveDataSuccess) return;

  // If Twelve Data is rate-limited or fails, seamlessly switch to the unlimited Live Backup network
  console.warn("Twelve Data API limit reached or symbol format mismatch. Activating Backup Live Network Channel...");
  updateStatusBadge("Engine: Live Backup", "#16a34a");
  await fetchLiveBackupData(symbol);
}

function updateStatusBadge(text, bgColor) {
  const badge = document.getElementById("api-status");
  badge.innerText = text;
  badge.style.background = bgColor;
}

// Twelve Data Primary Call
async function fetchTwelveData(symbol) {
  try {
    // Smart Exchange formatting for common Indian tickers inside Twelve Data's system
    let exchangeParam = "";
    if (["RELIANCE", "TCS", "CUPID"].includes(symbol)) {
      exchangeParam = "&exchange=NSE";
    }

    const quoteUrl = `https://api.twelvedata.com/quote?symbol=${symbol}${exchangeParam}&apikey=${TWELVE_DATA_KEY}`;
    const quoteResponse = await fetch(quoteUrl);
    const quoteData = await quoteResponse.json();
    
    if(quoteData.code === 429 || quoteData.status === "error" || !quoteData.close) return false;

    const tsUrl = `https://api.twelvedata.com/time_series?symbol=${symbol}${exchangeParam}&interval=1day&outputsize=20&apikey=${TWELVE_DATA_KEY}`;
    const tsResponse = await fetch(tsUrl);
    const tsData = await tsResponse.json();

    if(!tsData.values || tsData.values.length === 0) return false;

    const currentPrice = parseFloat(quoteData.close).toFixed(2);
    const changeValue = parseFloat(quoteData.change).toFixed(2);
    const percentChange = parseFloat(quoteData.percent_change).toFixed(2);
    
    const currencySymbol = (quoteData.currency === "INR" || exchangeParam.includes("NSE")) ? "₹" : "$";

    document.getElementById("company").innerText = quoteData.name || symbol;
    document.getElementById("price").innerText = `${currencySymbol} ${currentPrice}`;
    
    const isPositive = changeValue >= 0;
    document.getElementById("change").innerHTML = 
    `<span class="${isPositive ? 'green' : 'red'}">${isPositive ? '▲' : '▼'} ${percentChange}% (${changeValue}) Today</span>`;

    const history = [...tsData.values].reverse();
    const labels = history.map(v => {
      const date = new Date(v.datetime);
      return date.toLocaleDateString('en-US', {day:'2-digit', month:'short'});
    });
    const prices = history.map(v => parseFloat(v.close).toFixed(2));

    renderLineChart(symbol, labels, prices, isPositive);
    return true;
  } catch (error) {
    console.error("Twelve Data API Engine down:", error);
    return false;
  }
}

// Unlimited Live Backup Network (Using CORS Public Proxy to pull authentic historical market updates)
async function fetchLiveBackupData(symbol) {
  let finalTicker = symbol;
  let currencySymbol = "₹";

  // Auto-router to map indices and global formats securely
  if (symbol === "SENSEX") {
    finalTicker = "^BSESN";
    currencySymbol = "Pts";
  } else if (["AMD", "AAPL", "GOOGL", "TSLA", "NVDA", "MSFT", "AMZN"].includes(symbol)) {
    finalTicker = symbol;
    currencySymbol = "$";
  } else {
    if (!symbol.endsWith(".NS") && !symbol.endsWith(".BO")) {
      finalTicker = `${symbol}.NS`;
    }
    currencySymbol = "₹";
  }

  try {
    const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${finalTicker}?range=1mo&interval=1d`;
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
    
    const response = await fetch(proxyUrl);
    const wrapper = await response.json();
    const data = JSON.parse(wrapper.contents);
    
    if(!data.chart || !data.chart.result) {
      alert(`Asset "${symbol}" could not be located on the backup exchange.`);
      return;
    }

    const result = data.chart.result[0];
    const meta = result.meta;
    const timestamps = result.timestamp;
    const quotes = result.indicators.quote[0].close;

    const currentPrice = meta.regularMarketPrice.toFixed(2);
    const previousClose = meta.previousClose;
    const change = (currentPrice - previousClose).toFixed(2);
    const percentChange = ((change / previousClose) * 100).toFixed(2);
    const isPositive = change >= 0;

    const matched = popularStocks.find(s => s.ticker === symbol);
    document.getElementById("company").innerText = matched ? matched.name : `${symbol} Equity Asset`;
    document.getElementById("price").innerText = currencySymbol === "Pts" ? `${currentPrice} Pts` : `${currencySymbol} ${currentPrice}`;
    document.getElementById("change").innerHTML = 
    `<span class="${isPositive ? 'green' : 'red'}">${isPositive ? '▲' : '▼'} ${percentChange}% (${change}) Today</span>`;

    const labels = [];
    const prices = [];
    for(let i = 0; i < timestamps.length; i++) {
      if(quotes[i] !== null) {
        const date = new Date(timestamps[i] * 1000);
        labels.push(date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' }));
        prices.push(quotes[i].toFixed(2));
      }
    }

    renderLineChart(symbol, labels, prices, isPositive);
  } catch (error) {
    console.error("Backup Network Fail:", error);
    alert("Unable to reach global market networks.");
  }
}

function renderLineChart(labelSymbol, labels, dataPoints, isPositive) {
  if(chart) chart.destroy();
  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: labelSymbol,
        data: dataPoints,
        borderColor: isPositive ? '#22c55e' : '#ef4444',
        backgroundColor: 'transparent',
        borderWidth: 2.5,
        tension: 0.15,
        pointRadius: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#334155' }, ticks: { color: '#cbd5e1' } },
        y: { grid: { color: '#334155' }, ticks: { color: '#cbd5e1' } }
      }
    }
  });
}

window.onload = () => {
  buildWatchlist();
  loadAssetData("SENSEX");
};
</script>
</body>
</html>

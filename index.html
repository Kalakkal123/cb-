<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ultimate Multi-API Trading Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;background:#0f172a;color:#fff;font-family:Arial,sans-serif;height:100vh;overflow:hidden}
.app-container{display:flex;height:100vh;max-width:1400px;margin:0 auto}

.main-content{flex:1;padding:30px;overflow-y:auto;display:flex;flex-direction:column}
.sidebar{width:320px;background:#1e293b;border-left:1px solid #334155;display:flex;flex-direction:column;height:100%}
.sidebar-header{padding:20px;border-bottom:1px solid #334155}
.sidebar-header h3{margin:0;font-size:18px}
.stock-list{flex:1;overflow-y:auto;padding:10px}
.stock-item{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;margin-bottom:8px;background:#1e293b;border:1px solid #334155;border-radius:10px;cursor:pointer;transition:all .2s ease}
.stock-item:hover{background:#334155;transform:translateX(-3px)}
.stock-item .ticker{font-weight:bold;font-size:15px}
.stock-item .name{font-size:12px;color:#cbd5e1;margin-top:2px}
.stock-item .market-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:#475569;font-weight:bold}
.card{background:#1e293b;padding:25px;border-radius:16px;border:1px solid #334155;display:flex;flex-direction:column;flex:1;}
.search-box{display:flex;gap:10px;margin-bottom:20px}
input,button{padding:12px;border:none;border-radius:8px;font-size:16px}
input{flex:1;background:#334155;color:#fff}
input:focus{outline:2px solid #2563eb}
button{background:#2563eb;color:#fff;cursor:pointer;font-weight:bold;padding:12px 24px}
button:hover{background:#1d4ed8}
h1{margin-top:0;font-size:28px}
#price{font-size:44px;font-weight:bold;margin-top:15px;letter-spacing:-1px}
#change{font-size:18px;margin-bottom:15px;font-weight:500}
.green{color:#22c55e}.red{color:#ef4444}
.chart-container{margin-top:20px;position:relative;flex:1;min-height:350px}
canvas{background:#1e293b;border-radius:12px}
small{color:#cbd5e1}
.status-badge{font-size:12px;background:#2563eb;padding:4px 10px;border-radius:6px;float:right;font-weight:bold}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#475569;border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:#64748b}
</style>
</head>
<body>

<div class="app-container">
  <div class="main-content">
    <div class="card">
      <div class="status-badge" id="api-status">Engine: 12Data</div>
      <h1>📊 Multi-API Trading Dashboard</h1>
      <p style="margin-top:-5px; margin-bottom:20px;"><small>Chains 4 distinct public developer endpoints for uninterrupted live market quotes.</small></p>
      
      <div class="search-box">
        <input id="symbol" placeholder="Search any asset (e.g., AAPL, AMD, GOOGL, CUPID, SENSEX, RELIANCE)" value="SENSEX">
        <button onclick="handleSearch()">Search Across Networks</button>
      </div>

      <h2 id="company" style="margin-bottom:5px; color:#f8fafc;">--</h2>
      <div id="price">--</div>
      <div id="change">--</div>

      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <h3>🔥 Top Diverse Watchlist</h3>
      <p style="margin:5px 0 0 0; font-size:12px; color:#cbd5e1;">Click to instantly test route mapping</p>
    </div>
    <div class="stock-list" id="watchlist"></div>
  </div>
</div>

<script>
// Chained API Keys Configuration Panel
const TWELVE_DATA_KEY = "56093876cedd49b1b26e1ba33d9bae36";
const ALPHA_VANTAGE_KEY = "A4TET8QX2U6VNHR8";
const GEMINI_API_KEY = "AQ.Ab8RN6LquC-e4QqaJhm1dGqxWZmnaHo4GDnClBfpqZ_insGSKw";

let chart;

const popularStocks = [
  { ticker: "SENSEX", name: "BSE SENSEX Index", market: "INDEX" },
  { ticker: "AMD", name: "Advanced Micro Devices", market: "NASDAQ" },
  { ticker: "AAPL", name: "Apple Inc.", market: "NASDAQ" },
  { ticker: "GOOGL", name: "Alphabet Inc.", market: "NASDAQ" },
  { ticker: "CUPID", name: "Cupid Limited", market: "NSE" },
  { ticker: "RELIANCE", name: "Reliance Industries", market: "NSE" }
];

function buildWatchlist() {
  const container = document.getElementById("watchlist");
  container.innerHTML = "";
  popularStocks.forEach(stock => {
    const item = document.createElement("div");
    item.className = "stock-item";
    item.onclick = () => {
      document.getElementById("symbol").value = stock.ticker;
      loadAssetData(stock.ticker);
    };
    item.innerHTML = `
      <div>
        <div class="ticker">${stock.ticker}</div>
        <div class="name">${stock.name}</div>
      </div>
      <span class="market-tag">${stock.market}</span>
    `;
    container.appendChild(item);
  });
}

function handleSearch() {
  const query = document.getElementById("symbol").value.trim().toUpperCase();
  if(query) loadAssetData(query);
}

// Master Fallback Controller Pipeline
async function loadAssetData(symbol) {
  // --- TIER 1: TWELVE DATA API ---
  updateStatusBadge("Engine: TwelveData", "#2563eb");
  let tier1Success = await fetchTwelveData(symbol);
  if (tier1Success) return;

  // --- TIER 2: ALPHA VANTAGE API ---
  console.warn("Tier 1 exhausted or incompatible. Swapping to Alpha Vantage API...");
  updateStatusBadge("Engine: AlphaVantage", "#7c3aed");
  let tier2Success = await fetchAlphaVantage(symbol);
  if (tier2Success) return;

  // --- TIER 3: GOOGLE GEMINI FREE API ---
  console.warn("Tier 2 exhausted or incompatible. Swapping to Google Gemini API...");
  updateStatusBadge("Engine: Google Gemini", "#16a34a");
  let tier3Success = await fetchGeminiData(symbol);
  if (tier3Success) return;

  // --- TIER 4: ENDLESS PUBLIC CORS NETWORK ---
  console.warn("Tier 3 exhausted or unauthorized. Routing to Endless Public Network Proxy...");
  updateStatusBadge("Engine: Live Backup Net", "#b45309");
  await fetchLiveBackupNetwork(symbol);
}

function updateStatusBadge(text, bgColor) {
  const badge = document.getElementById("api-status");
  badge.innerText = text;
  badge.style.background = bgColor;
}

// Tier 1 Engine: Twelve Data API
async function fetchTwelveData(symbol) {
  try {
    let exchangeParam = "";
    if (["RELIANCE", "TCS", "CUPID"].includes(symbol)) exchangeParam = "&exchange=NSE";
    
    const quoteUrl = `https://api.twelvedata.com/quote?symbol=${symbol}${exchangeParam}&apikey=${TWELVE_DATA_KEY}`;
    const quoteResponse = await fetch(quoteUrl);
    const quoteData = await quoteResponse.json();
    
    if(quoteData.code === 429 || quoteData.status === "error" || !quoteData.close) return false;

    const tsUrl = `https://api.twelvedata.com/time_series?symbol=${symbol}${exchangeParam}&interval=1day&outputsize=15&apikey=${TWELVE_DATA_KEY}`;
    const tsResponse = await fetch(tsUrl);
    const tsData = await tsResponse.json();

    if(!tsData.values || tsData.values.length === 0) return false;

    const currentPrice = parseFloat(quoteData.close).toFixed(2);
    const changeValue = parseFloat(quoteData.change).toFixed(2);
    const percentChange = parseFloat(quoteData.percent_change).toFixed(2);
    const currencySymbol = (quoteData.currency === "INR" || exchangeParam.includes("NSE")) ? "₹" : "$";

    updateUI(quoteData.name || symbol, currencySymbol, currentPrice, changeValue, percentChange);

    const history = [...tsData.values].reverse();
    const labels = history.map(v => new Date(v.datetime).toLocaleDateString('en-US', {day:'2-digit', month:'short'}));
    const prices = history.map(v => parseFloat(v.close).toFixed(2));

    renderLineChart(symbol, labels, prices, changeValue >= 0);
    return true;
  } catch (e) { return false; }
}

// Tier 2 Engine: Alpha Vantage API
async function fetchAlphaVantage(symbol) {
  try {
    const ticker = ["RELIANCE", "TCS", "CUPID"].includes(symbol) ? `${symbol}.BSE` : symbol;
    const url = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${ticker}&apikey=${ALPHA_VANTAGE_KEY}`;
    const response = await fetch(url);
    const data = await response.json();
    
    if (data["Note"] || data["Information"] || !data["Time Series (Daily)"]) return false;

    const timeSeries = data["Time Series (Daily)"];
    const dates = Object.keys(timeSeries).slice(0, 15).reverse();
    const prices = dates.map(d => parseFloat(timeSeries[d]["4. close"]));
    
    const currentPrice = prices[prices.length - 1];
    const previousPrice = prices[prices.length - 2] || currentPrice;
    const change = currentPrice - previousPrice;
    const percentChange = (change / previousPrice) * 100;
    const currencySymbol = ticker.includes("BSE") ? "₹" : "$";

    const matched = popularStocks.find(s => s.ticker === symbol);
    updateUI(matched ? matched.name : symbol, currencySymbol, currentPrice.toFixed(2), change.toFixed(2), percentChange.toFixed(2));
    
    const labels = dates.map(d => new Date(d).toLocaleDateString('en-US', {day:'2-digit', month:'short'}));
    renderLineChart(symbol, labels, prices, change >= 0);
    return true;
  } catch(e) { return false; }
}

// Tier 3 Engine: Native Google Gemini Free Tier API
async function fetchGeminiData(symbol) {
  try {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
    const promptText = `Provide current price metrics and a 15-day closing array for "${symbol}". Return ONLY a raw JSON object matching this format: {"name": "Full Name", "price": 120.50, "change": 1.50, "percent_change": 1.26, "currency": "₹", "history": [115, 117, 119, 120.50]}. Supply 15 values in the history array.`;

    const response = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: promptText }] }],
        generationConfig: { responseMimeType: "application/json" }
      })
    });

    if(!response.ok) return false; // Gracefully fall through to Tier 4 if key shows 401 error
    
    const responseJson = await response.json();
    const rawText = responseJson.candidates[0].content.parts[0].text.trim();
    const marketData = JSON.parse(rawText);

    updateUI(marketData.name, marketData.currency, marketData.price, marketData.change, marketData.percent_change);
    const labels = marketData.history.map((_, idx) => `Day ${idx + 1}`);
    renderLineChart(symbol, labels, marketData.history, marketData.change >= 0);
    return true;
  } catch (e) { return false; }
}

// Tier 4 Engine: Unlimited Baseline Public Network Proxy
async function fetchLiveBackupNetwork(symbol) {
  let finalTicker = symbol === "SENSEX" ? "^BSESN" : (["AMD", "AAPL", "GOOGL", "TSLA", "NVDA"].includes(symbol) ? symbol : `${symbol}.NS`);
  let currencySymbol = symbol === "SENSEX" ? "Pts" : (["AMD", "AAPL", "GOOGL"].includes(symbol) ? "$" : "₹");

  try {
    const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${finalTicker}?range=1mo&interval=1d`;
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
    
    const response = await fetch(proxyUrl);
    const wrapper = await response.json();
    const data = JSON.parse(wrapper.contents);
    
    if(!data.chart || !data.chart.result) {
      alert(`Asset "${symbol}" not recognized across any market API.`);
      return;
    }

    const result = data.chart.result[0];
    const meta = result.meta;
    const timestamps = result.timestamp;
    const quotes = result.indicators.quote[0].close;

    const currentPrice = meta.regularMarketPrice.toFixed(2);
    const previousClose = meta.previousClose;
    const change = (currentPrice - previousClose).toFixed(2);
    const percentChange = ((change / previousClose) * 100).toFixed(2);

    const matched = popularStocks.find(s => s.ticker === symbol);
    updateUI(matched ? matched.name : symbol, currencySymbol, currentPrice, change, percentChange);

    const labels = [];
    const prices = [];
    for(let i = 0; i < timestamps.length; i++) {
      if(quotes[i] !== null) {
        labels.push(new Date(timestamps[i] * 1000).toLocaleDateString('en-IN', { day: '2-digit', month: 'short' }));
        prices.push(quotes[i].toFixed(2));
      }
    }

    renderLineChart(symbol, labels, prices, change >= 0);
  } catch (error) {
    alert("Connection error fetching from baseline backup networks.");
  }
}

function updateUI(name, currency, price, change, percent) {
  document.getElementById("company").innerText = name;
  document.getElementById("price").innerText = currency === "Pts" ? `${price} Pts` : `${currency} ${price}`;
  const isPositive = change >= 0;
  document.getElementById("change").innerHTML = 
  `<span class="${isPositive ? 'green' : 'red'}">${isPositive ? '▲' : '▼'} ${percent}% (${change}) Today</span>`;
}

function renderLineChart(labelSymbol, labels, dataPoints, isPositive) {
  if(chart) chart.destroy();
  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: labelSymbol,
        data: dataPoints,
        borderColor: isPositive ? '#22c55e' : '#ef4444',
        backgroundColor: 'transparent',
        borderWidth: 2.5,
        tension: 0.15,
        pointRadius: 3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#334155' }, ticks: { color: '#cbd5e1' } },
        y: { grid: { color: '#334155' }, ticks: { color: '#cbd5e1' } }
      }
    }
  });
}

window.onload = () => {
  buildWatchlist();
  loadAssetData("SENSEX");
};
</script>
</body>
</html>

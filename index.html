<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Indian Stock Viewer Demo</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;background:#0f172a;color:#fff;font-family:Arial,sans-serif}
.container{max-width:900px;margin:40px auto;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:16px}
input,button{padding:12px;border:none;border-radius:8px;font-size:16px}
input{width:65%;background:#334155;color:#fff;margin-right:10px}
button{background:#2563eb;color:#fff;cursor:pointer;font-weight:bold}
button:hover{background:#1d4ed8}
h1{margin-top:0}
#price{font-size:40px;font-weight:bold;margin-top:15px}
#change{font-size:18px;margin-bottom:15px}
.green{color:#22c55e}.red{color:#ef4444}
canvas{margin-top:25px;background:#1e293b;border-radius:12px}
small{color:#cbd5e1}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>📈 Indian Stock Viewer (Free & No API Key)</h1>
<p><small>Enter an NSE stock symbol (e.g., RELIANCE, TCS, ZOMATO, INFOSYS)</small></p>
<input id="symbol" placeholder="RELIANCE" value="RELIANCE">
<button onclick="loadStock()">Search</button>

<h2 id="company"></h2>
<div id="price">--</div>
<div id="change"></div>

<canvas id="chart" height="120"></canvas>
</div>
</div>

<script>
let chart;

async function loadStock(){
 const symbolInput = document.getElementById("symbol").value.trim().toUpperCase();
 if(!symbolInput) return;

 // Automatically appends .NS for National Stock Exchange if not provided
 const symbol = symbolInput.endsWith(".NS") ? symbolInput : `${symbolInput}.NS`;

 try {
   // Using allorigins proxy to bypass local browser CORS blocks when fetching public data
   const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=1mo&interval=1d`)}`;
   
   const response = await fetch(proxyUrl);
   if (!response.ok) throw new Error("Network response error");
   
   const wrapper = await response.json();
   const data = JSON.parse(wrapper.contents);
   
   if(!data.chart || !data.chart.result) {
     alert("Stock not found. Please check the symbol (e.g., RELIANCE).");
     return;
   }

   const result = data.chart.result[0];
   const meta = result.meta;
   const timestamps = result.timestamp;
   const quotes = result.indicators.quote[0].close;

   if(!timestamps || !quotes) {
     alert("No historical data available for this symbol.");
     return;
   }

   // Fetching live parameters
   const currentPrice = meta.regularMarketPrice.toFixed(2);
   const previousClose = meta.previousClose;
   const change = (currentPrice - previousClose).toFixed(2);
   const percentChange = ((change / previousClose) * 100).toFixed(2);

   // Updating UI
   document.getElementById("company").innerText = symbolInput;
   document.getElementById("price").innerText = `₹ ${currentPrice}`;
   
   const isPositive = change >= 0;
   document.getElementById("change").innerHTML =
   `<span class="${isPositive ? 'green' : 'red'}">${isPositive ? '▲' : '▼'} ${percentChange}% (${change}) Today</span>`;

   // Formatting Dates and cleaning null values for Chart.js
   const labels = [];
   const prices = [];
   
   for(let i = 0; i < timestamps.length; i++) {
     if(quotes[i] !== null) {
       const date = new Date(timestamps[i] * 1000);
       labels.push(date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' }));
       prices.push(quotes[i].toFixed(2));
     }
   }

   // Rendering Chart
   if(chart) chart.destroy();
   chart = new Chart(document.getElementById("chart"), {
     type: "line",
     data: {
       labels: labels,
       datasets: [{
         label: symbolInput,
         data: prices,
         borderColor: isPositive ? '#22c55e' : '#ef4444',
         backgroundColor: 'transparent',
         borderWidth: 2,
         tension: 0.2,
         pointRadius: 2
       }]
     },
     options: {
       responsive: true,
       plugins: { legend: { display: false } },
       scales: {
         x: { grid: { color: '#334155' }, ticks: { color: '#cbd5e1' } },
         y: { grid: { color: '#334155' }, ticks: { color: '#cbd5e1' } }
       }
     }
   });

 } catch (error) {
   console.error(error);
   alert("Failed to fetch data. Try again in a moment.");
 }
}

// Load a default stock on startup
window.onload = loadStock;
</script>
</body>
</html>

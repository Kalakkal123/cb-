<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stock Viewer Demo</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;background:#0f172a;color:#fff;font-family:Arial,sans-serif}
.container{max-width:900px;margin:40px auto;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:16px}
input,button{padding:12px;border:none;border-radius:8px}
input{width:70%;background:#334155;color:#fff}
button{background:#2563eb;color:#fff;cursor:pointer}
h1{margin-top:0}
#price{font-size:40px;font-weight:bold}
.green{color:#22c55e}.red{color:#ef4444}
canvas{margin-top:25px;background:#fff;border-radius:12px}
small{color:#cbd5e1}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>📈 Stock Viewer Demo</h1>
<p><small>Get a free API key from https://twelvedata.com and replace YOUR_API_KEY below.</small></p>
<input id="symbol" placeholder="AAPL or RELIANCE">
<button onclick="loadStock()">Search</button>

<h2 id="company"></h2>
<div id="price">--</div>
<div id="change"></div>

<canvas id="chart" height="100"></canvas>
</div>
</div>

<script>
const API_KEY="56093876cedd49b1b26e1ba33d9bae36";
let chart;

async function loadStock(){
 const symbol=document.getElementById("symbol").value.trim();
 if(!symbol) return;

 const quote=await fetch(`https://api.twelvedata.com/quote?symbol=${symbol}&apikey=${API_KEY}`).then(r=>r.json());
 if(quote.status==="error"){alert(quote.message);return;}

 document.getElementById("company").innerText=quote.name||symbol;
 document.getElementById("price").innerText=`${quote.currency||""} ${quote.close}`;
 const ch=parseFloat(quote.percent_change);
 document.getElementById("change").innerHTML=
 `<span class="${ch>=0?"green":"red"}">${quote.percent_change}% (${quote.change}) Today</span>`;

 const ts=await fetch(`https://api.twelvedata.com/time_series?symbol=${symbol}&interval=1day&outputsize=30&apikey=${API_KEY}`).then(r=>r.json());

 const labels=ts.values.reverse().map(v=>v.datetime);
 const prices=ts.values.reverse().map(v=>parseFloat(v.close));

 if(chart) chart.destroy();
 chart=new Chart(document.getElementById("chart"),{
   type:"line",
   data:{labels:labels,datasets:[{label:symbol,data:prices,borderWidth:2,tension:.3}]},
   options:{responsive:true,plugins:{legend:{display:false}}}
 });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Global Trading Game Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;background:#0f172a;color:#fff;font-family:Arial,sans-serif;height:100vh;overflow:hidden}
.app-container{display:flex;height:100vh;max-width:1400px;margin:0 auto}

.main-content{flex:1;padding:30px;overflow-y:auto;display:flex;flex-direction:column}
.sidebar{width:320px;background:#1e293b;border-left:1px solid #334155;display:flex;flex-direction:column;height:100%}
.sidebar-header{padding:20px;border-bottom:1px solid #334155}
.sidebar-header h3{margin:0;font-size:18px}
.stock-list{flex:1;overflow-y:auto;padding:10px}
.stock-item{display:flex;justify-content:between;align-items:center;padding:12px 15px;margin-bottom:8px;background:#1e293b;border:1px solid #334155;border-radius:10px;cursor:pointer;transition:all .2s ease}
.stock-item:hover{background:#334155;transform:translateX(-3px)}
.stock-item .ticker{font-weight:bold;font-size:15px}
.stock-item .name{font-size:12px;color:#cbd5e1;margin-top:2px}
.stock-item .market-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:#475569;font-weight:bold}
.card{background:#1e293b;padding:25px;border-radius:16px;border:1px solid #334155}
.search-box{display:flex;gap:10px;margin-bottom:20px}
input,button{padding:12px;border:none;border-radius:8px;font-size:16px}
input{flex:1;background:#334155;color:#fff}
input:focus{outline:2px solid #2563eb}
button{background:#2563eb;color:#fff;cursor:pointer;font-weight:bold;padding:12px 24px}
button:hover{background:#1d4ed8}
h1{margin-top:0;font-size:28px}
#price{font-size:44px;font-weight:bold;margin-top:15px;letter-spacing:-1px}
#change{font-size:18px;margin-bottom:15px;font-weight:500}
.green{color:#22c55e}.red{color:#ef4444}
.chart-container{margin-top:20px;position:relative;flex:1;min-height:350px}
canvas{background:#1e293b;border-radius:12px}
small{color:#cbd5e1}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#475569;border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:#64748b}
</style>
</head>
<body>

<div class="app-container">
  <div class="main-content">
    <div class="card" style="display:flex; flex-direction:column; flex:1;">
      <h1>📈 Trading Simulation Dashboard</h1>
      <p style="margin-top:-5px; margin-bottom:20px;"><small>Search any US ticker (e.g., AAPL) or Indian ticker with extension (e.g., RELIANCE.NS)</small></p>
      
      <div class="search-box">
        <input id="symbol" placeholder="Enter stock code (e.g., TSLA or INFOSYS.NS)" value="RELIANCE.NS">
        <button onclick="handleSearch()">Search Market</button>
      </div>

      <h2 id="company" style="margin-bottom:5px; color:#f8fafc;">--</h2>
      <div id="price">--</div>
      <div id="change"></div>

      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <h3>🔥 Top Watchlist Stocks</h3>
      <p style="margin:5px 0 0 0; font-size:12px; color:#cbd5e1;">Click to view real-time historical data</p>
    </div>
    <div class="stock-list" id="watchlist">
      </div>
  </div>
</div>

<script>
let chart;

// Array of popular Indian and US stocks for your trading game setup
const popularStocks = [
  { ticker: "RELIANCE.NS", name: "Reliance Industries", market: "NSE" },
  { ticker: "TCS.NS", name: "Tata Consultancy Services", market: "NSE" },
  { ticker: "INFOSYS.NS", name: "Infosys Limited", market: "NSE" },
  { ticker: "ZOMATO.NS", name: "Zomato Limited", market: "NSE" },
  { ticker: "HDFCBANK.NS", name: "HDFC Bank Limited", market: "NSE" },
  { ticker: "TATAMOTORS.NS", name: "Tata Motors Limited", market: "NSE" },
  { ticker: "AAPL", name: "Apple Inc.", market: "NASDAQ" },
  { ticker: "TSLA", name: "Tesla, Inc.", market: "NASDAQ" },
  { ticker: "NVDA", name: "NVIDIA Corporation", market: "NASDAQ" },
  { ticker: "MSFT", name: "Microsoft Corporation", market: "NASDAQ" },
  { ticker: "AMZN", name: "Amazon.com, Inc.", market: "NASDAQ" },
  { ticker: "GOOGL", name: "Alphabet Inc.", market: "NASDAQ" }
];

// Initialize UI Sidebar
function buildWatchlist() {
  const container = document.getElementById("watchlist");
  container.innerHTML = "";
  
  popularStocks.forEach(stock => {
    const item = document.createElement("div");
    item.className = "stock-item";
    item.style.display = "flex";
    item.style.justifyContent = "space-between";
    item.onclick = () => {
      document.getElementById("symbol").value = stock.ticker;
      loadStock(stock.ticker);
    };
    
    item.innerHTML = `
      <div>
        <div class="ticker">${stock.ticker.replace(".NS", "")}</div>
        <div class="name">${stock.name}</div>
      </div>
      <span class="market-tag">${stock.market}</span>
    `;
    container.appendChild(item);
  });
}

function handleSearch() {
  const query = document.getElementById("symbol").value.trim().toUpperCase();
  if(query) loadStock(query);
}

async function loadStock(symbol){
 try {
   // Fetch public financial metrics routed through the free CORS proxy bypass tool
   const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=1mo&interval=1d`)}`;
   
   const response = await fetch(proxyUrl);
   if (!response.ok) throw new Error("Network issue");
   
   const wrapper = await response.json();
   const data = JSON.parse(wrapper.contents);
   
   if(!data.chart || !data.chart.result) {
     alert("Stock data not found. Remember to add '.NS' for Indian stocks (like SBIN.NS)!");
     return;
   }

   const result = data.chart.result[0];
   const meta = result.meta;
   const timestamps = result.timestamp;
   const quotes = result.indicators.quote[0].close;

   if(!timestamps || !quotes) {
     alert("Data arrays are incomplete for this specific ticker.");
     return;
   }

   // Extract core values
   const currentPrice = meta.regularMarketPrice.toFixed(2);
   const previousClose = meta.previousClose;
   const change = (currentPrice - previousClose).toFixed(2);
   const percentChange = ((change / previousClose) * 100).toFixed(2);
   
   // Handle dynamic local currency tags
   const currencySymbol = (meta.currency === "INR" || symbol.endsWith(".NS")) ? "₹" : "$";

   // Match lookups to names in array or drop down to default ticker string
   const localMatch = popularStocks.find(s => s.ticker === symbol);
   document.getElementById("company").innerText = localMatch ? `${localMatch.name} (${symbol.replace(".NS", "")})` : symbol;
   
   document.getElementById("price").innerText = `${currencySymbol} ${currentPrice}`;
   
   const isPositive = change >= 0;
   document.getElementById("change").innerHTML =
   `<span class="${isPositive ? 'green' : 'red'}">${isPositive ? '▲' : '▼'} ${percentChange}% (${change}) Today</span>`;

   // Process chart labels and historical parameters
   const labels = [];
   const prices = [];
   
   for(let i = 0; i < timestamps.length; i++) {
     if(quotes[i] !== null) {
       const date = new Date(timestamps[i] * 1000);
       labels.push(date.toLocaleDateString('en-US', { day: '2-digit', month: 'short' }));
       prices.push(quotes[i].toFixed(2));
     }
   }

   // Paint dynamic charting data canvas
   if(chart) chart.destroy();
   chart = new Chart(document.getElementById("chart"), {
     type: "line",
     data: {
       labels: labels,
       datasets: [{
         label: symbol,
         data: prices,
         borderColor: isPositive ? '#22c55e' : '#ef4444',
         backgroundColor: 'transparent',
         borderWidth: 2,
         tension: 0.15,
         pointRadius: 2
       }]
     },
     options: {
       responsive: true,
       maintainAspectRatio: false,
       plugins: { legend: { display: false } },
       scales: {
         x: { grid: { color: '#334155' }, ticks: { color: '#cbd5e1' } },
         y: { grid: { color: '#334155' }, ticks: { color: '#cbd5e1' } }
       }
     }
   });

 } catch (error) {
   console.error(error);
   alert("Failed to acquire records. Check spelling or connection layout.");
 }
}

// Initial triggers when local context mounts
window.onload = () => {
  buildWatchlist();
  loadStock("RELIANCE.NS"); // Boots default dynamic tracking index onto Reliance
};
</script>
</body>
</html>

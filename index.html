<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Global Trading Game Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;background:#0f172a;color:#fff;font-family:Arial,sans-serif;height:100vh;overflow:hidden}
.app-container{display:flex;height:100vh;max-width:1400px;margin:0 auto}

.main-content{flex:1;padding:30px;overflow-y:auto;display:flex;flex-direction:column}
.sidebar{width:320px;background:#1e293b;border-left:1px solid #334155;display:flex;flex-direction:column;height:100%}
.sidebar-header{padding:20px;border-bottom:1px solid #334155}
.sidebar-header h3{margin:0;font-size:18px}
.stock-list{flex:1;overflow-y:auto;padding:10px}
.stock-item{display:flex;justify-content:between;align-items:center;padding:12px 15px;margin-bottom:8px;background:#1e293b;border:1px solid #334155;border-radius:10px;cursor:pointer;transition:all .2s ease}
.stock-item:hover{background:#334155;transform:translateX(-3px)}
.stock-item .ticker{font-weight:bold;font-size:15px}
.stock-item .name{font-size:12px;color:#cbd5e1;margin-top:2px}
.stock-item .market-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:#475569;font-weight:bold}
.card{background:#1e293b;padding:25px;border-radius:16px;border:1px solid #334155;display:flex;flex-direction:column;flex:1;}
.search-box{display:flex;gap:10px;margin-bottom:20px}
input,button{padding:12px;border:none;border-radius:8px;font-size:16px}
input{flex:1;background:#334155;color:#fff}
input:focus{outline:2px solid #2563eb}
button{background:#2563eb;color:#fff;cursor:pointer;font-weight:bold;padding:12px 24px}
button:hover{background:#1d4ed8}
h1{margin-top:0;font-size:28px}
#price{font-size:44px;font-weight:bold;margin-top:15px;letter-spacing:-1px}
#change{font-size:18px;margin-bottom:15px;font-weight:500}
.green{color:#22c55e}.red{color:#ef4444}
.chart-container{margin-top:20px;position:relative;flex:1;min-height:350px}
canvas{background:#1e293b;border-radius:12px}
small{color:#cbd5e1}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#475569;border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:#64748b}
</style>
</head>
<body>

<div class="app-container">
  <div class="main-content">
    <div class="card">
      <h1>📈 Trading Simulation Dashboard</h1>
      <p style="margin-top:-5px; margin-bottom:20px;"><small>Get a free key from alphavantage.co. US stocks: <b>AAPL</b>, Indian stocks use BSE codes or NSE symbols like <b>RELIANCE.BSE</b> or <b>INFY.BSE</b></small></p>
      
      <div class="search-box">
        <input id="symbol" placeholder="Enter stock code (e.g., TSLA or RELIANCE.BSE)" value="RELIANCE.BSE">
        <button onclick="handleSearch()">Search Market</button>
      </div>

      <h2 id="company" style="margin-bottom:5px; color:#f8fafc;">--</h2>
      <div id="price">--</div>
      <div id="change">--</div>

      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <h3>🔥 Top Watchlist Stocks</h3>
      <p style="margin:5px 0 0 0; font-size:12px; color:#cbd5e1;">Click to view real-time data</p>
    </div>
    <div class="stock-list" id="watchlist"></div>
  </div>
</div>

<script>
// ⚠️ PASTE YOUR FREE ALPHA VANTAGE API KEY HERE
const API_KEY = "A4TET8QX2U6VNHR8"; 
let chart;

// Watchlist array using Alpha Vantage compatible global notation
const popularStocks = [
  { ticker: "RELIANCE.BSE", name: "Reliance Industries", market: "BSE" },
  { ticker: "TCS.BSE", name: "Tata Consultancy Services", market: "BSE" },
  { ticker: "INFY.BSE", name: "Infosys Limited", market: "BSE" },
  { ticker: "TATAMOTORS.BSE", name: "Tata Motors Limited", market: "BSE" },
  { ticker: "AAPL", name: "Apple Inc.", market: "NASDAQ" },
  { ticker: "TSLA", name: "Tesla, Inc.", market: "NASDAQ" },
  { ticker: "NVDA", name: "NVIDIA Corporation", market: "NASDAQ" },
  { ticker: "MSFT", name: "Microsoft Corporation", market: "NASDAQ" }
];

function buildWatchlist() {
  const container = document.getElementById("watchlist");
  container.innerHTML = "";
  
  popularStocks.forEach(stock => {
    const item = document.createElement("div");
    item.className = "stock-item";
    item.onclick = () => {
      document.getElementById("symbol").value = stock.ticker;
      loadStock(stock.ticker);
    };
    
    item.innerHTML = `
      <div>
        <div class="ticker">${stock.ticker.split(".")[0]}</div>
        <div class="name">${stock.name}</div>
      </div>
      <span class="market-tag">${stock.market}</span>
    `;
    container.appendChild(item);
  });
}

function handleSearch() {
  const query = document.getElementById("symbol").value.trim().toUpperCase();
  if(query) loadStock(query);
}

async function loadStock(symbol){
 if(API_KEY === "YOUR_KEY_HERE") {
   alert("Please get a free API key from alphavantage.co and paste it into line 54 of the code!");
   return;
 }

 try {
   // Alpha Vantage TIME_SERIES_DAILY returns clean history and metadata natively
   const url = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${symbol}&apikey=${API_KEY}`;
   
   const response = await fetch(url);
   const data = await response.json();
   
   if (data["Note"] || data["Information"]) {
     alert("API Rate limit hit (Free tier allows 25 requests/day). Wait a minute and try again.");
     return;
   }
   
   const timeSeries = data["Time Series (Daily)"];
   if(!timeSeries) {
     alert("Stock not found! Use standard US symbols (AAPL) or Indian BSE symbols (RELIANCE.BSE).");
     return;
   }

   // Extract dates and prices
   const dates = Object.keys(timeSeries).slice(0, 30).reverse(); // Last 30 trading days
   const prices = dates.map(date => parseFloat(timeSeries[date]["4. close"]));
   
   const currentPrice = prices[prices.length - 1];
   const previousPrice = prices[prices.length - 2] || currentPrice;
   const change = (currentPrice - previousPrice).toFixed(2);
   const percentChange = ((change / previousPrice) * 100).toFixed(2);
   
   // Handle currency indicators
   const isIndian = symbol.includes("BSE");
   const currencySymbol = isIndian ? "₹" : "$";

   // Update text panels
   const matched = popularStocks.find(s => s.ticker === symbol);
   document.getElementById("company").innerText = matched ? `${matched.name} (${symbol.split(".")[0]})` : symbol;
   document.getElementById("price").innerText = `${currencySymbol} ${currentPrice.toFixed(2)}`;
   
   const isPositive = change >= 0;
   document.getElementById("change").innerHTML =
   `<span class="${isPositive ? 'green' : 'red'}">${isPositive ? '▲' : '▼'} ${percentChange}% (${change}) Since Yesterday</span>`;

   // Process and render lines
   if(chart) chart.destroy();
   chart = new Chart(document.getElementById("chart"), {
     type: "line",
     data: {
       labels: dates.map(d => new Date(d).toLocaleDateString('en-US', {day:'2-digit', month:'short'})),
       datasets: [{
         label: symbol,
         data: prices,
         borderColor: isPositive ? '#22c55e' : '#ef4444',
         backgroundColor: 'transparent',
         borderWidth: 2.5,
         tension: 0.15,
         pointRadius: 2
       }]
     },
     options: {
       responsive: true,
       maintainAspectRatio: false,
       plugins: { legend: { display: false } },
       scales: {
         x: { grid: { color: '#334155' }, ticks: { color: '#cbd5e1' } },
         y: { grid: { color: '#334155' }, ticks: { color: '#cbd5e1' } }
       }
     }
   });

 } catch (error) {
   console.error(error);
   alert("An error occurred while rendering the asset data layout.");
 }
}

window.onload = () => {
  buildWatchlist();
  loadStock("RELIANCE.BSE"); 
};
</script>
</body>
</html>

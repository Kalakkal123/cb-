<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Global Trading Simulator Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;background:#0f172a;color:#fff;font-family:Arial,sans-serif;height:100vh;overflow:hidden}
.app-container{display:flex;height:100vh;max-width:1400px;margin:0 auto}

.main-content{flex:1;padding:30px;overflow-y:auto;display:flex;flex-direction:column}
.sidebar{width:320px;background:#1e293b;border-left:1px solid #334155;display:flex;flex-direction:column;height:100%}
.sidebar-header{padding:20px;border-bottom:1px solid #334155}
.sidebar-header h3{margin:0;font-size:18px}
.stock-list{flex:1;overflow-y:auto;padding:10px}
.stock-item{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;margin-bottom:8px;background:#1e293b;border:1px solid #334155;border-radius:10px;cursor:pointer;transition:all .2s ease}
.stock-item:hover{background:#334155;transform:translateX(-3px)}
.stock-item .ticker{font-weight:bold;font-size:15px}
.stock-item .name{font-size:12px;color:#cbd5e1;margin-top:2px}
.stock-item .market-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:#475569;font-weight:bold}
.card{background:#1e293b;padding:25px;border-radius:16px;border:1px solid #334155;display:flex;flex-direction:column;flex:1;}
.search-box{display:flex;gap:10px;margin-bottom:20px}
input,button{padding:12px;border:none;border-radius:8px;font-size:16px}
input{flex:1;background:#334155;color:#fff}
input:focus{outline:2px solid #2563eb}
button{background:#2563eb;color:#fff;cursor:pointer;font-weight:bold;padding:12px 24px}
button:hover{background:#1d4ed8}
h1{margin-top:0;font-size:28px}
#price{font-size:44px;font-weight:bold;margin-top:15px;letter-spacing:-1px}
#change{font-size:18px;margin-bottom:15px;font-weight:500}
.green{color:#22c55e}.red{color:#ef4444}
.chart-container{margin-top:20px;position:relative;flex:1;min-height:350px}
canvas{background:#1e293b;border-radius:12px}
small{color:#cbd5e1}
.status-badge{font-size:12px;background:#16a34a;padding:4px 10px;border-radius:6px;float:right;font-weight:bold}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#475569;border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:#64748b}
</style>
</head>
<body>

<div class="app-container">
  <div class="main-content">
    <div class="card">
      <div class="status-badge" id="api-status">Engine: Live Network</div>
      <h1>📈 Real-Time Trading Dashboard</h1>
      <p style="margin-top:-5px; margin-bottom:20px;"><small>No keys required. Enter US tickers directly (e.g., <b>AAPL</b>) or Indian tickers (e.g., <b>IDFCFIRSTB</b>).</small></p>
      
      <div class="search-box">
        <input id="symbol" placeholder="e.g., IDFCFIRSTB, RELIANCE, AAPL, TSLA" value="IDFCFIRSTB">
        <button onclick="handleSearch()">Search Asset</button>
      </div>

      <h2 id="company" style="margin-bottom:5px; color:#f8fafc;">--</h2>
      <div id="price">--</div>
      <div id="change">--</div>

      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <h3>🔥 Top Watchlist Assets</h3>
      <p style="margin:5px 0 0 0; font-size:12px; color:#cbd5e1;">Click to view real-time data</p>
    </div>
    <div class="stock-list" id="watchlist"></div>
  </div>
</div>

<script>
let chart;

// Pre-defined watchlist matching our search syntax
const popularStocks = [
  { ticker: "IDFCFIRSTB", name: "IDFC First Bank Ltd", market: "NSE" },
  { ticker: "RELIANCE", name: "Reliance Industries", market: "NSE" },
  { ticker: "TCS", name: "Tata Consultancy Services", market: "NSE" },
  { ticker: "AAPL", name: "Apple Inc.", market: "NASDAQ" },
  { ticker: "TSLA", name: "Tesla Inc.", market: "NASDAQ" },
  { ticker: "NVDA", name: "NVIDIA Corp.", market: "NASDAQ" }
];

function buildWatchlist() {
  const container = document.getElementById("watchlist");
  container.innerHTML = "";
  popularStocks.forEach(stock => {
    const item = document.createElement("div");
    item.className = "stock-item";
    item.onclick = () => {
      document.getElementById("symbol").value = stock.ticker;
      loadAssetData(stock.ticker);
    };
    item.innerHTML = `
      <div>
        <div class="ticker">${stock.ticker}</div>
        <div class="name">${stock.name}</div>
      </div>
      <span class="market-tag">${stock.market}</span>
    `;
    container.appendChild(item);
  });
}

function handleSearch() {
  const query = document.getElementById("symbol").value.trim().toUpperCase();
  if(query) loadAssetData(query);
}

async function loadAssetData(symbol) {
  // Determine if it's an Indian stock or US stock based on common tech names
  const isUS = ["AAPL", "TSLA", "NVDA", "MSFT", "AMZN", "GOOGL"].includes(symbol);
  const finalTicker = isUS ? symbol : `${symbol}.NS`;
  const currencySymbol = isUS ? "$" : "₹";

  try {
    // Free public bypass endpoint using Yahoo's historical tracker via AllOrigins CORS proxy
    const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${finalTicker}?range=1mo&interval=1d`;
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
    
    const response = await fetch(proxyUrl);
    if (!response.ok) throw new Error("Network issue");
    
    const wrapper = await response.json();
    const data = JSON.parse(wrapper.contents);
    
    if(!data.chart || !data.chart.result) {
      alert("Stock ticker not recognized. Ensure spelling matches exactly.");
      return;
    }

    const result = data.chart.result[0];
    const meta = result.meta;
    const timestamps = result.timestamp;
    const quotes = result.indicators.quote[0].close;

    if(!timestamps || !quotes) {
      alert("Trading history unavailable for this symbol.");
      return;
    }

    // Extract core parameters
    const currentPrice = meta.regularMarketPrice.toFixed(2);
    const previousClose = meta.previousClose;
    const change = (currentPrice - previousClose).toFixed(2);
    const percentChange = ((change / previousClose) * 100).toFixed(2);
    const isPositive = change >= 0;

    // Display values to UI
    const matched = popularStocks.find(s => s.ticker === symbol);
    document.getElementById("company").innerText = matched ? matched.name : `${symbol} Equity`;
    document.getElementById("price").innerText = `${currencySymbol} ${currentPrice}`;
    document.getElementById("change").innerHTML = 
    `<span class="${isPositive ? 'green' : 'red'}">${isPositive ? '▲' : '▼'} ${percentChange}% (${change}) Today</span>`;

    // Process dates and historical elements for Chart.js
    const labels = [];
    const prices = [];
    for(let i = 0; i < timestamps.length; i++) {
      if(quotes[i] !== null) {
        const date = new Date(timestamps[i] * 1000);
        labels.push(date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' }));
        prices.push(quotes[i].toFixed(2));
      }
    }

    // Render Chart line canvas layouts
    if(chart) chart.destroy();
    chart = new Chart(document.getElementById("chart"), {
      type: "line",
      data: {
        labels: labels,
        datasets: [{
          label: symbol,
          data: prices,
          borderColor: isPositive ? '#22c55e' : '#ef4444',
          backgroundColor: 'transparent',
          borderWidth: 2.5,
          tension: 0.15,
          pointRadius: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: '#334155' }, ticks: { color: '#cbd5e1' } },
          y: { grid: { color: '#334155' }, ticks: { color: '#cbd5e1' } }
        }
      }
    });

  } catch (error) {
    console.error(error);
    alert("Connection timeout fetching live financial data.");
  }
}

window.onload = () => {
  buildWatchlist();
  loadAssetData("IDFCFIRSTB");
};
</script>
</body>
</html>
